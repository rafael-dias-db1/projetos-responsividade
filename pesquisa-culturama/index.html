<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/pesquisa-culturama/css/culturama-favico.png" />
    <link rel="stylesheet" href="css/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Montserrat&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Pesquisa Culturama</title>
  </head>
  <body>
    <main>
      <header>
        <img src="img/logo-culturama.png" alt="Logo Culturama" />
        <h1>Pesquisa Online</h1>
      </header>
      <section>
        <form action="sucesso.html" method="get">
          <fieldset>
            <!-- DADOS PESSOAIS -->
            <legend>Dados Pessoais</legend>
            <label for="name">Nome:</label>
            <input id="name" type="text" name="userName" required />
            <br />
            <label for="age">Idade:</label>
            <input
              id="age"
              type="number"
              name="userAge"
              min="12"
              max="100"
              required
            />
            <br />
            <label for="birthDate">Data de Nascimento:</label>
            <input id="birthDate" type="date" name="userBirthDate" />
            <br />
            <label for="email">Email:</label>
            <input id="email" type="email" name="userEmail" required />
            <br />
            <label for="phone">Telefone</label>
            <input
              id="phone"
              type="tel"
              name="userPhoneNumber"
              pattern="[0-9]{11}"
              placeholder="DDD + número sem espaços ou hifen"
              aria-describedby="phoneHelp"
            />
            <small id="phoneHelp"
              >Prencha com 11 digitos no formato: DDD + número sem espaça ou
              hífen.</small
            >
            <br />
            <label for="image">Upload de foto</label>
            <input id="image" type="file" accept="image/*" name="userImage" />
            <br />
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>
            <p>Gênero:</p>
            <input id="fem" type="radio" name="userGender" value="Feminino" />
            <label for="fem">Feminino</label>

            <input id="masc" type="radio" name="userGender" value="Masculino" />
            <label for="masc">Masculino</label>

            <input
              id="notInformed"
              type="radio"
              name="userGender"
              value="notInformed"
            />
            <label for="notInformed">Prefiro não informar</label>
            <br />

            <label for="maritalStatus">Estado civil:</label>
            <select id="maritalStatus" name="userMaritalStatus">
              <option value="notInformed">Selecione...</option>
              <option value="casado">Casado</option>
              <option value="solteiro">Solteiro</option>
              <option value="divorciado">Divorciado</option>
              <option value="casado">União estável</option>
            </select>

            <label for="state">Estado:</label>
            <select id="state" name="userState" required>
              <option value="Acre">Acre</option>
              <option value="Alagoas">Alagoas</option>
              <option value="Amapa">Amapá</option>
              <option value="Amazonas">Amazonas</option>
              <option value="Bahia">Bahia</option>
              <option value="Ceara">Ceará</option>
              <option value="DistritoFederal">Distrito Federal</option>
              <option value="EspiritoSanto">Espirito Santo</option>
              <option value="Goias">Goiás</option>
              <option value="Maranhao">Maranhão</option>
              <option value="MatoGrossoDoSul">Mato Grosso do Sul</option>
              <option value="MatoGrosso">Mato Grosso</option>
              <option value="MinasGerais">Minas Gerais</option>
              <option value="Para">Pará</option>
              <option value="Paraiba">Paraíba</option>
              <option value="Parana">Paraná</option>
              <option value="Pernambuco">Pernambuco</option>
              <option value="Piaui">Piauí</option>
              <option value="RioDeJaneiro">Rio de Janeiro</option>
              <option value="RioGrandeDoNorte">Rio Grande do Norte</option>
              <option value="RioGrandeDoSul">Rio Grande do Sul</option>
              <option value="Rondonia">Rondônia</option>
              <option value="Roraima">Roraima</option>
              <option value="SantaCatarina">Santa Catarina</option>
              <option value="SaoPaulo">São Paulo</option>
              <option value="Sergipe">Sergipe</option>
              <option value="Tocantins">Tocantins</option>
            </select>

            <label for="cidade">Cidade</label>
            <input id="cidade" type="text" name="userCidade" />
          </fieldset>

          <fieldset>
            <legend>Hábitos</legend>
            <p>Redes Sociais:</p>
            <input
              id="instagram"
              type="checkbox"
              name="social"
              value="instagram"
            />
            <label for="instagram">Instagram</label>
            <br />
            <input
              id="facebook"
              type="checkbox"
              name="social"
              value="facebook"
            />
            <label for="facebook">Facebook</label>
            <br />
            <input
              id="linkedin"
              type="checkbox"
              name="social"
              value="linkedin"
            />
            <label for="linkedin">LinkedIn</label>
            <br />
            <input id="twitter" type="checkbox" name="social" value="twitter" />
            <label for="twitter">Twitter</label>
            <br />

            <label for="musicStyle">Estilo musical:</label>
            <input
              list="styleTypes"
              id="musicStyle"
              name="userMusicStyle"
              type="text"
            />
            <br />
            <datalist id="styleTypes">
              <option value="Rock"></option>
              <option value="Pop"></option>
              <option value="Samba"></option>
              <option value="Sertanejo"></option>
            </datalist>
            <label for="favoriteColor">Cor Favorita</label>
            <input type="color" name="userFavoriteColor" id="favoriteColor" />
          </fieldset>

          <fieldset>
            <legend>Opinião</legend>

            <p>O que você acha da qualidade do nosso serviço?</p>
            <input
              id="otimo"
              type="radio"
              name="serviceOpinion"
              value="otimo"
            />
            <label for="otimo">Ótimo</label>

            <input id="boa" type="radio" name="serviceOpinion" value="boa" />
            <label for="boa">Boa</label>

            <input
              id="regular"
              type="radio"
              name="serviceOpinion"
              value="regular"
            />
            <label for="regular">Regular</label>

            <input id="ruim" type="radio" name="serviceOpinion" value="ruim" />
            <label for="ruim">Ruim</label>
            <br />

            <label for="opiniao">Opinião sobre a pesquisa:</label>
            <textarea
              id="opiniao"
              name="userOpinion"
              placeholder="Digite aqui sua opinião..."
            ></textarea>
          </fieldset>

          <fieldset>
            <legend>Confirmações</legend>

            <input
              type="checkbox"
              name="userLgpd"
              id="userLgpdTerm"
              value="accepted"
              required
            />
            <label for="userLgpdTerm">Eu aceito participar da pesquisa</label
            ><br />

            <input
              type="checkbox"
              name="userGetResult"
              id="getResult"
              value="accepted"
            />
            <label for="getResult">Desejo receber o resultado por email</label
            ><br />
          </fieldset>

          <button type="submit">Enviar</button>
          <button type="reset">Limpar</button>
        </form>
      </section>
    </main>
  </body>
</html>
